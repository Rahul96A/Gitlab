name: CD — Build Images & Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "infra/**"
      - ".github/workflows/cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false  # Never cancel in-progress deploys

env:
  APP_NAME: gitlabclone
  ACR_NAME: acrgitlabclone
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "22"

permissions:
  id-token: write   # OIDC login
  contents: read

jobs:
  # ─── Build & Push Docker Images ──────────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login -n ${{ env.ACR_NAME }}

      - name: Build & push API image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/gitlabclone-api:${{ steps.tag.outputs.tag }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/gitlabclone-api:latest \
            -f src/backend/Dockerfile \
            src/backend/
          docker push ${{ env.ACR_NAME }}.azurecr.io/gitlabclone-api --all-tags

      - name: Build & push Frontend image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/gitlabclone-web:${{ steps.tag.outputs.tag }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/gitlabclone-web:latest \
            -f src/frontend/Dockerfile \
            src/frontend/
          docker push ${{ env.ACR_NAME }}.azurecr.io/gitlabclone-web --all-tags

  # ─── Deploy Infrastructure ──────────────────────────────────────────────
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-images
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: |
          az deployment sub create \
            --location ${{ vars.AZURE_LOCATION || 'eastus2' }} \
            --template-file infra/main.bicep \
            --parameters \
              appName=${{ env.APP_NAME }} \
              location=${{ vars.AZURE_LOCATION || 'eastus2' }} \
              sqlAdminPassword='${{ secrets.SQL_ADMIN_PASSWORD }}' \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              apiImageTag=${{ needs.build-images.outputs.image-tag }} \
              frontendImageTag=${{ needs.build-images.outputs.image-tag }}

  # ─── Deploy API ─────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build-images, deploy-infra]
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update API Container App
        run: |
          az containerapp update \
            -n ca-${{ env.APP_NAME }}-api \
            -g rg-${{ env.APP_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/gitlabclone-api:${{ needs.build-images.outputs.image-tag }}

      - name: Wait for API health
        run: |
          API_FQDN=$(az containerapp show \
            -n ca-${{ env.APP_NAME }}-api \
            -g rg-${{ env.APP_NAME }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Checking health at https://$API_FQDN/health ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://$API_FQDN/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy!"
              exit 0
            fi
            echo "  Attempt $i/30 — status $STATUS, waiting..."
            sleep 10
          done
          echo "::error::API health check failed after 5 minutes"
          exit 1

  # ─── Deploy Frontend ────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-images, deploy-infra]
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Frontend Container App
        run: |
          az containerapp update \
            -n ca-${{ env.APP_NAME }}-web \
            -g rg-${{ env.APP_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/gitlabclone-web:${{ needs.build-images.outputs.image-tag }}

  # ─── Smoke Test ─────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run smoke tests
        run: |
          API_FQDN=$(az containerapp show \
            -n ca-${{ env.APP_NAME }}-api \
            -g rg-${{ env.APP_NAME }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          WEB_FQDN=$(az containerapp show \
            -n ca-${{ env.APP_NAME }}-web \
            -g rg-${{ env.APP_NAME }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "==> Testing API health..."
          curl -sf "https://$API_FQDN/health" | jq .

          echo "==> Testing API Swagger..."
          curl -sf "https://$API_FQDN/swagger/v1/swagger.json" | jq '.info'

          echo "==> Testing API projects endpoint..."
          curl -sf "https://$API_FQDN/api/v1/projects" | jq '.totalCount'

          echo "==> Testing Frontend..."
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://$WEB_FQDN")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Frontend returned $STATUS"
            exit 1
          fi
          echo "Frontend OK (200)"

          echo "==> All smoke tests passed!"
