name: CI — Build, Test & Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "22"
  BACKEND_PATH: src/backend
  FRONTEND_PATH: src/frontend

jobs:
  # ─── Backend ─────────────────────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BACKEND_PATH }}

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Ci_Test!Passw0rd"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Ci_Test!Passw0rd' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release --warnaserror

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__AppDb: "Server=localhost,1433;Database=GitLabClone_Test;User Id=sa;Password=Ci_Test!Passw0rd;TrustServerCertificate=True"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ${{ env.BACKEND_PATH }}/**/TestResults/**

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ${{ env.BACKEND_PATH }}/**/coverage.cobertura.xml

  backend-security:
    name: Backend — Security Scan
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: ${{ env.BACKEND_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: NuGet Audit (vulnerability scan)
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt

      - name: Check for critical vulnerabilities
        run: |
          if grep -q "Critical" vuln-report.txt; then
            echo "::error::Critical NuGet vulnerabilities found!"
            exit 1
          fi

      - name: .NET format check
        run: dotnet format --verify-no-changes --verbosity diagnostic

  # ─── Frontend ────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build, Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --max-warnings 0
        continue-on-error: true  # Don't fail CI until eslint config is finalized

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_PATH }}/dist

  frontend-security:
    name: Frontend — Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  # ─── Infrastructure ──────────────────────────────────────────────────────
  infra-validate:
    name: Infra — Validate Bicep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        if: github.event_name == 'push'  # Only validate against Azure on push

      - name: Bicep lint
        run: az bicep build --file infra/main.bicep --stdout > /dev/null
        if: github.event_name == 'push'

      - name: Validate Bicep syntax (offline)
        run: |
          # Check all bicep files parse correctly
          for f in $(find infra -name "*.bicep"); do
            echo "Checking $f..."
            az bicep build --file "$f" --stdout > /dev/null 2>&1 || echo "::warning::$f has issues"
          done
        if: github.event_name == 'pull_request'
        continue-on-error: true
